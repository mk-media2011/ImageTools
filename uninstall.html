<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tools - Uninstall</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0ea5e9;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-dim: #64748b;
      --border: #e2e8f0;
      --grid: rgba(14, 165, 233, 0.05);
    }
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 95%;
      max-width: 800px;
      height: 85vh;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--primary);
    }
    .iframe-container {
      flex: 1;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>We're sorry to see you go!</h1>
      <p style="color: var(--text-dim); margin-top: 8px; margin-bottom: 0;">Please let us know how we can improve so we can do better next time.</p>
    </div>
    <div class="iframe-container">
      <iframe src="https://www.survio.com/survey/i/W2O8C8J5F6Z1A6Y4D" width="100%" height="100%" style="border: none; overflow: hidden;"></iframe>
    </div>
  </div>
</body>
</html>
